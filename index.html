<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Idiqlat:wght@200;300;400&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <main>
      <div class="component-qr">
        <img class="image-qr" src="/images/image-qr-code.png" alt="qr" />
        <h1 class="text-qr">
          Improve your front-end skills by building projects
        </h1>
        <p class="paragrapy">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </div>
    </main>
  </body>
</html>
